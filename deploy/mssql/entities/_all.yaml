# Seed entity-registry definitions for the Mymi ABI sync subsystem.
#
# Imported into the `_default` tenant on first boot if the entity
# does not already exist in the registry. Edit via the UI / REST
# import endpoint after first boot; this file is the "as-built"
# baseline matching deploy/mssql/sync-recipes.json.
#
# Strategy: mymi-scd2 (bundled). Override per-table/per-entity via
# `scd2Override` when local conventions diverge.

---
id: contract
tenantId: _default
displayName: Contract
description: Root entity for an ABI contract and its full dependency closure.
rootTable: core.Contract
idColumn: contractId
labelColumn: name
scd2:
  strategyId: mymi-scd2
  strategyVersion: latest
tables:
  - { name: core.Contract,              executionOrder: 0,  verified: true,  scope: { kind: rootPk, column: contractId } }
  - { name: core.Pipeline,              executionOrder: 1,  verified: true,  scope: { kind: rootPk, column: contractId } }
  - { name: core.ContractColumn,        executionOrder: 2,  verified: true,  scope: { kind: rootPk, column: contractId } }
  - { name: core.Dataset,               executionOrder: 3,  verified: true,  scope: { kind: rootPk, column: contractId } }
  - { name: core.Step,                  executionOrder: 4,  verified: true,
      scope: { kind: sql, predicate: "EXISTS (SELECT 1 FROM [core].[Pipeline] p WHERE p.pipelineId = [core].[Step].pipelineId AND p.contractId = {id})" } }
  - { name: core.Activity,              executionOrder: 5,  verified: true,  scope: { kind: rootPk, column: pipelineId } }
  - { name: core.DatasetColumn,         executionOrder: 6,  verified: true,  scope: { kind: rootPk, column: datasetId } }
  - { name: core.DatasetMapping,        executionOrder: 7,  verified: true,  scope: { kind: rootPk, column: datasetId_Left } }
  - { name: core.Rule,                  executionOrder: 8,  verified: true,
      scope: { kind: sql, predicate: "EXISTS (SELECT 1 FROM [core].[Dataset] p WHERE p.datasetId = [core].[Rule].inputDatasetId AND p.contractId = {id})" } }
  - { name: core.DatasetMappingColumn,  executionOrder: 9,  verified: true,  scope: { kind: rootPk, column: datasetMappingId } }
  - { name: core.RuleColumn,            executionOrder: 10, verified: true,
      scope: { kind: sql, predicate: "EXISTS (SELECT 1 FROM [core].[DatasetColumn] p INNER JOIN [core].[Dataset] _p1 ON _p1.datasetId = p.lookupDatasetId WHERE p.datasetColumnId = [core].[RuleColumn].inputDatasetColumnId AND _p1.contractId = {id})" } }
  - { name: core.RuleCondition,         executionOrder: 11, verified: true,
      scope: { kind: sql, predicate: "EXISTS (SELECT 1 FROM [core].[DatasetColumn] p INNER JOIN [core].[Dataset] _p1 ON _p1.datasetId = p.lookupDatasetId WHERE p.datasetColumnId = [core].[RuleCondition].inputDatasetColumnId AND _p1.contractId = {id})" } }
  - { name: core.RuleLink,              executionOrder: 12, verified: true,
      scope: { kind: sql, predicate: "EXISTS (SELECT 1 FROM [core].[DatasetColumn] p INNER JOIN [core].[Dataset] _p1 ON _p1.datasetId = p.lookupDatasetId WHERE p.datasetColumnId = [core].[RuleLink].outputDatasetColumnId AND _p1.contractId = {id})" } }
  - { name: core.RuleConditionValue,    executionOrder: 13, verified: true,
      scope: { kind: sql, predicate: "EXISTS (SELECT 1 FROM [core].[RuleCondition] p INNER JOIN [core].[DatasetColumn] _p1 ON _p1.datasetColumnId = p.inputDatasetColumnId INNER JOIN [core].[Dataset] _p2 ON _p2.datasetId = _p1.lookupDatasetId WHERE p.ruleConditionId = [core].[RuleConditionValue].ruleConditionId AND _p2.contractId = {id})" } }
policies:
  approvalPolicyId: null
  freezeWindowIds: []
  riskMultiplier: 1.0
provenance: { kind: legacy-migration, legacyPipelineId: 788 }

