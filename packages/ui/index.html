<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>MI:A</title>
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script>
      // Pre-paint theme application — avoids FOUC (flash of wrong theme).
      // Reads localStorage["mia:theme"] (light | dark | system, default system).
      // Resolves "system" via prefers-color-scheme. Stamps data-theme on <html>.
      (function () {
        try {
          var stored = localStorage.getItem("mia:theme");
          var mode = stored === "light" || stored === "dark" || stored === "system" ? stored : "system";
          var resolved = mode === "system"
            ? (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark")
            : mode;
          document.documentElement.dataset.theme = resolved;
        } catch (e) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
  </head>
  <body style="background:var(--color-canvas, #09090b)">
    <div id="root"></div>
    <script type="module" src="/src/boot/main.tsx"></script>
  </body>
</html>
